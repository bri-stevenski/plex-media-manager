name: Planner
on:
  pull_request:
    paths:
      - src/**
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: npx harness validate --severity error
      - run: npx harness check-deps --severity error
