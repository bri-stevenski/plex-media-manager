name: Tests
on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - docs/**
      - '**/*.md'
      - package.json
      - pnpm-lock.yaml
      - vitest.config.ts
      - tsconfig.json
      - .prettierignore
      - .eslintrc.json
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check
      - run: pnpm run format:check
